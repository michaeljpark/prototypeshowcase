<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prototype Showcase - Michael Joongmin Park</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #slideshow {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      will-change: transform;
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .slide img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* Positions */
    .slide.current {
      transform: translateY(0);
      z-index: 2;
    }

    .slide.above {
      transform: translateY(-100%);
      z-index: 1;
    }

    .slide.below {
      transform: translateY(100%);
      z-index: 1;
    }

    .slide.hidden {
      transform: translateY(100%);
      z-index: 0;
      visibility: hidden;
    }
  </style>
</head>
<body>

  <div id="slideshow"></div>

  <script>
    const TOTAL = 23;
    const slideshow = document.getElementById('slideshow');

    let currentSlide = 0;
    let isAnimating = false;
    let slides = [];

    // Create slides
    for (let i = 0; i < TOTAL; i++) {
      const div = document.createElement('div');
      div.className = 'slide hidden';
      const img = document.createElement('img');
      img.src = `Frame-${i}.png`;
      img.alt = `Frame ${i}`;
      img.draggable = false;
      div.appendChild(img);
      slideshow.appendChild(div);
      slides.push(div);
    }

    function updateSlides() {
      for (let i = 0; i < TOTAL; i++) {
        slides[i].className = 'slide';
        if (i === currentSlide) {
          slides[i].classList.add('current');
        } else if (i < currentSlide) {
          slides[i].classList.add('above');
        } else {
          slides[i].classList.add('below');
        }
      }
    }

    function goTo(index) {
      if (index < 0 || index >= TOTAL || index === currentSlide || isAnimating) return;
      isAnimating = true;

      const prev = currentSlide;
      currentSlide = index;

      // Only animate current and target, hide the rest instantly
      for (let i = 0; i < TOTAL; i++) {
        if (i === prev || i === index) continue;
        slides[i].style.transition = 'none';
      }

      // Position the target slide before animating
      if (index > prev) {
        // Going forward: target starts below
        slides[index].style.transition = 'none';
        slides[index].className = 'slide below';
        slides[index].offsetHeight; // force reflow
        slides[index].style.transition = '';
      } else {
        // Going backward: target starts above
        slides[index].style.transition = 'none';
        slides[index].className = 'slide above';
        slides[index].offsetHeight; // force reflow
        slides[index].style.transition = '';
      }

      // Animate
      slides[index].className = 'slide current';
      if (index > prev) {
        slides[prev].className = 'slide above';
      } else {
        slides[prev].className = 'slide below';
      }

      setTimeout(() => {
        // Clean up non-animated slides
        for (let i = 0; i < TOTAL; i++) {
          if (i === currentSlide) continue;
          slides[i].style.transition = '';
          if (i < currentSlide) {
            slides[i].className = 'slide above';
          } else {
            slides[i].className = 'slide below';
          }
        }
        isAnimating = false;
      }, 620);
    }

    // Wheel: one scroll = one slide
    let wheelAccum = 0;
    const WHEEL_THRESHOLD = 50;

    document.addEventListener('wheel', (e) => {
      e.preventDefault();
      if (isAnimating) return;

      wheelAccum += e.deltaY;

      if (wheelAccum > WHEEL_THRESHOLD) {
        wheelAccum = 0;
        goTo(currentSlide + 1);
      } else if (wheelAccum < -WHEEL_THRESHOLD) {
        wheelAccum = 0;
        goTo(currentSlide - 1);
      }
    }, { passive: false });

    // Reset accumulator when not scrolling
    let wheelResetTimer;
    document.addEventListener('wheel', () => {
      clearTimeout(wheelResetTimer);
      wheelResetTimer = setTimeout(() => { wheelAccum = 0; }, 200);
    }, { passive: true });

    // Keyboard
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowDown' || e.key === 'ArrowRight' || e.key === ' ') {
        e.preventDefault();
        goTo(currentSlide + 1);
      } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
        e.preventDefault();
        goTo(currentSlide - 1);
      } else if (e.key === 'Home') {
        e.preventDefault();
        goTo(0);
      } else if (e.key === 'End') {
        e.preventDefault();
        goTo(TOTAL - 1);
      }
    });

    // Left click = next, right click = previous
    document.addEventListener('click', (e) => {
      goTo(currentSlide + 1);
    });

    document.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      goTo(currentSlide - 1);
    });

    // Touch swipe
    let touchStartY = 0;
    let touchStartTime = 0;

    document.addEventListener('touchstart', (e) => {
      touchStartY = e.touches[0].clientY;
      touchStartTime = Date.now();
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
      const deltaY = touchStartY - e.changedTouches[0].clientY;
      const elapsed = Date.now() - touchStartTime;

      if (Math.abs(deltaY) > 40 && elapsed < 500) {
        if (deltaY > 0) {
          goTo(currentSlide + 1);
        } else {
          goTo(currentSlide - 1);
        }
      }
    }, { passive: true });

    // Init
    updateSlides();
    slides[0].className = 'slide current';
  </script>
</body>
</html>
